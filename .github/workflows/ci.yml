name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-yaml:
    name: Workflow YAML
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install workflow validation dependencies
        run: python -m pip install "PyYAML>=6,<7"

      - name: Validate workflow YAML
        run: python .github/scripts/validate_workflow_yaml.py

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.7"
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install "pytest>=7.4,<9"

      - name: Run tests
        run: python -m pytest -q

  package:
    name: Package
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package build dependencies
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

  micropython:
    name: MicroPython Unix smoke
    runs-on: ubuntu-22.04

    env:
      MICROPYTHON_VERSION: v1.25.0
      MICROPYTHON_DIR: /tmp/micropython

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install MicroPython build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 pkg-config libffi-dev

      - name: Check out MicroPython
        run: |
          git clone --depth 1 --branch "$MICROPYTHON_VERSION" \
            https://github.com/micropython/micropython.git "$MICROPYTHON_DIR"

      - name: Build MicroPython Unix port
        run: |
          make -C "$MICROPYTHON_DIR/mpy-cross" -j2
          make -C "$MICROPYTHON_DIR/ports/unix" submodules
          make -C "$MICROPYTHON_DIR/ports/unix" -j2

      - name: Run upysm smoke tests
        run: |
          "$MICROPYTHON_DIR/ports/unix/build-standard/micropython" test/upysm_smoke.py
